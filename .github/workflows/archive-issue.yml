name: Archive Hell report

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

concurrency:
  group: hell-report-archive-${{ github.repository }}
  cancel-in-progress: false

jobs:
  archive:
    if: >-
      startsWith(github.event.issue.title, '[Hell]') ||
      contains(github.event.issue.labels.*.name, 'hell-report')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install archive dependencies
        run: python -m pip install -r requirements-actions.txt
      - name: Validate and archive Issue
        run: >-
          python scripts/archive_issue.py
          --event "$GITHUB_EVENT_PATH"
          --repo-root "$GITHUB_WORKSPACE"
          --config "$GITHUB_WORKSPACE/config"
          --result "$RUNNER_TEMP/archive-result.json"
      - name: Read controlled archive result
        id: result
        run: |
          echo "status=$(jq -r '.status' "$RUNNER_TEMP/archive-result.json")" >> "$GITHUB_OUTPUT"
          echo "changed=$(jq -r '.changed // false' "$RUNNER_TEMP/archive-result.json")" >> "$GITHUB_OUTPUT"
          echo "record=$(jq -r '.record // ""' "$RUNNER_TEMP/archive-result.json")" >> "$GITHUB_OUTPUT"
      - name: Generate archive indexes
        if: steps.result.outputs.status == 'archived' && steps.result.outputs.changed == 'true'
        run: >-
          python scripts/update_readme.py
          --records "$GITHUB_WORKSPACE/records"
          --readme "$GITHUB_WORKSPACE/README.md"
          --agents-dir "$GITHUB_WORKSPACE/docs/agents"
          --agents-config "$GITHUB_WORKSPACE/config/agents.yml"
          --repository "$GITHUB_REPOSITORY"
      - name: Commit archived record and indexes
        if: steps.result.outputs.status == 'archived' && steps.result.outputs.changed == 'true'
        env:
          RECORD_PATH: ${{ steps.result.outputs.record }}
        run: |
          git config user.name "hell-claude[bot]"
          git config user.email "hell-claude[bot]@users.noreply.github.com"
          git add -- "$RECORD_PATH" README.md docs/agents
          git commit -m "data: archive Issue #${{ github.event.issue.number }}"
          for attempt in 1 2 3; do
            git pull --rebase origin "${{ github.event.repository.default_branch }}"
            git push origin "HEAD:${{ github.event.repository.default_branch }}" && exit 0
          done
          exit 1
      - name: Update Issue status
        uses: actions/github-script@v7
        env:
          RESULT_PATH: ${{ runner.temp }}/archive-result.json
        with:
          script: |
            const fs = require("fs");
            const result = JSON.parse(fs.readFileSync(process.env.RESULT_PATH, "utf8"));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const definitions = {
              "hell-report": ["5319e7", "Structured Hell report"],
              "archived": ["1f883d", "Archived in the record library"],
              "invalid-report": ["d93f0b", "Report format requires correction"],
              "needs-redaction": ["b60205", "Sensitive content requires removal"],
              "possible-duplicate": ["fbca04", "May duplicate an existing report"]
            };
            for (const [name, [color, description]] of Object.entries(definitions)) {
              try {
                await github.rest.issues.createLabel({owner, repo, name, color, description});
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }
            const current = await github.rest.issues.listLabelsOnIssue({owner, repo, issue_number});
            for (const label of ["archived", "invalid-report", "needs-redaction", "possible-duplicate"]) {
              if (current.data.some(item => item.name === label)) {
                await github.rest.issues.removeLabel({owner, repo, issue_number, name: label});
              }
            }
            const labels = ["hell-report", result.status];
            if (result.duplicate_issue) labels.push("possible-duplicate");
            await github.rest.issues.addLabels({owner, repo, issue_number, labels});
            let body = "";
            if (result.status === "invalid-report") {
              body = "The report was not archived. Fix these format checks:\n\n" +
                result.errors.map(value => `- ${value}`).join("\n");
            } else if (result.status === "needs-redaction") {
              body = "The report was not archived. Remove content detected by:\n\n" +
                result.findings.map(value => `- ${value}`).join("\n");
            } else if (result.duplicate_issue) {
              body = `Archived with a possible duplicate hint for #${result.duplicate_issue}.`;
            }
            if (body) {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
            }
